<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 12; ry: 12; }
      .title { font: 700 16px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #111827; }
      .text { font: 13px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #374151; }
      .arrow { stroke: #111827; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
      .subtle { fill: #f9fafb; stroke: #e5e7eb; stroke-width: 2; rx: 12; ry: 12; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#111827"/>
    </marker>
  </defs>

  <!-- Background panels -->
  <rect x="24" y="24" width="912" height="312" class="subtle"/>
  <text x="44" y="52" class="title">async-rollout: Ray actor topology</text>

  <!-- Driver -->
  <rect x="64" y="96" width="240" height="180" class="box"/>
  <text x="84" y="132" class="title">Driver (main.py)</text>
  <text x="84" y="158" class="text">- starts Ray</text>
  <text x="84" y="178" class="text">- creates Trainer + Reconciler</text>
  <text x="84" y="198" class="text">- seeds jobs</text>
  <text x="84" y="218" class="text">- starts workers</text>
  <text x="84" y="238" class="text">- ticks reconciler + progress bar</text>

  <!-- Reconciler -->
  <rect x="360" y="88" width="260" height="196" class="box"/>
  <text x="380" y="124" class="title">Reconciler (reconciler.py)</text>
  <text x="380" y="150" class="text">Owns job table (authoritative)</text>
  <text x="380" y="170" class="text">- lease_job()</text>
  <text x="380" y="190" class="text">- submit_result()</text>
  <text x="380" y="210" class="text">- tick(): expire leases</text>
  <text x="380" y="230" class="text">- policy lag checks</text>
  <text x="380" y="250" class="text">- checkpoint save/load</text>

  <!-- Trainer -->
  <rect x="676" y="96" width="220" height="180" class="box"/>
  <text x="696" y="132" class="title">Trainer (trainer.py)</text>
  <text x="696" y="158" class="text">Tracks policy version</text>
  <text x="696" y="178" class="text">- submit_rollout()</text>
  <text x="696" y="198" class="text">- bumps version every</text>
  <text x="696" y="218" class="text">  train_every rollouts</text>
  <text x="696" y="238" class="text">- checkpoint save/load</text>

  <!-- Workers -->
  <rect x="360" y="296" width="536" height="44" class="box"/>
  <text x="380" y="324" class="title">RolloutWorkers (worker.py) × N</text>
  <text x="645" y="324" class="text">heartbeat ’ lease ’ sleep ’ submit</text>

  <!-- Arrows -->
  <path d="M 304 154 C 330 154, 330 154, 360 154" class="arrow"/>
  <text x="314" y="144" class="text">tick / seed</text>

  <path d="M 620 154 C 650 154, 650 154, 676 154" class="arrow"/>
  <text x="632" y="144" class="text">policy + rollouts</text>

  <path d="M 540 284 C 540 300, 540 300, 540 296" class="arrow"/>
  <text x="556" y="292" class="text">lease / submit</text>
</svg>
