<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 12; ry: 12; }
      .title { font: 700 15px ui-sans-serif, system-ui, Arial; fill: #111827; }
      .sub { font: 13px ui-sans-serif, system-ui, Arial; fill: #374151; }
      .label { font: 12px ui-sans-serif, system-ui, Arial; fill: #6b7280; }
      .arrow { stroke: #374151; stroke-width: 2; fill: none; marker-end: url(#ah); }
      .bg { fill: #f9fafb; stroke: #e5e7eb; stroke-width: 1.5; rx: 14; ry: 14; }
    </style>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#374151"/>
    </marker>
  </defs>

  <rect x="16" y="16" width="848" height="408" class="bg"/>
  <text x="36" y="44" class="title">async-rollout: Ray actor topology</text>

  <!-- Driver -->
  <rect x="40" y="76" width="220" height="160" class="box"/>
  <text x="60" y="104" class="title">Driver (main.py)</text>
  <text x="60" y="128" class="sub">starts Ray</text>
  <text x="60" y="148" class="sub">creates Trainer + Reconciler</text>
  <text x="60" y="168" class="sub">seeds jobs</text>
  <text x="60" y="188" class="sub">spawns workers</text>
  <text x="60" y="208" class="sub">tick loop + progress bar</text>

  <!-- Reconciler -->
  <rect x="320" y="76" width="240" height="160" class="box"/>
  <text x="340" y="104" class="title">Reconciler</text>
  <text x="340" y="128" class="sub">owns job table</text>
  <text x="340" y="148" class="sub">lease_job()</text>
  <text x="340" y="168" class="sub">submit_result()</text>
  <text x="340" y="188" class="sub">tick(): expire leases</text>
  <text x="340" y="208" class="sub">policy lag checks</text>

  <!-- Trainer -->
  <rect x="620" y="76" width="220" height="160" class="box"/>
  <text x="640" y="104" class="title">Trainer</text>
  <text x="640" y="128" class="sub">tracks policy version</text>
  <text x="640" y="148" class="sub">submit_rollout()</text>
  <text x="640" y="168" class="sub">bumps version every</text>
  <text x="640" y="188" class="sub">train_every rollouts</text>
  <text x="640" y="208" class="sub">checkpoint save/load</text>

  <!-- Workers -->
  <rect x="320" y="310" width="520" height="80" class="box"/>
  <text x="340" y="340" class="title">RolloutWorkers x N</text>
  <text x="340" y="364" class="sub">heartbeat -> lease -> sleep -> submit</text>

  <!-- Driver -> Reconciler -->
  <path d="M 260 156 L 320 156" class="arrow"/>
  <text x="268" y="148" class="label">tick / seed</text>

  <!-- Reconciler -> Trainer -->
  <path d="M 560 130 L 620 130" class="arrow"/>
  <text x="568" y="122" class="label">rollouts</text>

  <!-- Trainer -> Reconciler (policy version query) -->
  <path d="M 620 190 L 560 190" class="arrow"/>
  <text x="566" y="182" class="label">policy ver</text>

  <!-- Workers -> Reconciler -->
  <path d="M 440 310 L 440 236" class="arrow"/>
  <text x="448" y="278" class="label">lease / submit</text>

  <!-- Workers -> Reconciler (heartbeat) -->
  <path d="M 500 310 L 500 236" class="arrow"/>
  <text x="508" y="278" class="label">heartbeat</text>
</svg>
