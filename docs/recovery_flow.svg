<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 10; ry: 10; }
      .title { font: 700 14px ui-sans-serif, system-ui, Arial; fill: #111827; }
      .sub { font: 13px ui-sans-serif, system-ui, Arial; fill: #374151; }
      .label { font: 12px ui-sans-serif, system-ui, Arial; fill: #6b7280; }
      .arrow { stroke: #374151; stroke-width: 2; fill: none; marker-end: url(#ah); }
      .bg { fill: #f9fafb; stroke: #e5e7eb; stroke-width: 1.5; rx: 14; ry: 14; }
      .save { fill: #eef2ff; stroke: #6366f1; }
      .kill { fill: #fef2f2; stroke: #ef4444; }
    </style>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#374151"/>
    </marker>
  </defs>

  <rect x="16" y="16" width="848" height="348" class="bg"/>
  <text x="36" y="44" class="title">Checkpoint + recovery demo (main.py)</text>

  <!-- Row 1 -->
  <rect x="40" y="76" width="230" height="80" class="box"/>
  <text x="60" y="104" class="title">1. Run warmup</text>
  <text x="60" y="128" class="sub">tick reconciler + workers</text>

  <rect x="320" y="76" width="230" height="80" class="box save"/>
  <text x="340" y="104" class="title">2. Save checkpoints</text>
  <text x="340" y="128" class="sub">Trainer + Reconciler to JSON</text>

  <rect x="600" y="76" width="240" height="80" class="box kill"/>
  <text x="620" y="104" class="title">3. Kill actors</text>
  <text x="620" y="128" class="sub">ray.kill(trainer, reconciler)</text>

  <!-- Row 2 -->
  <rect x="40" y="220" width="230" height="100" class="box"/>
  <text x="60" y="250" class="title">4. Recreate actors</text>
  <text x="60" y="274" class="sub">new Trainer + Reconciler</text>
  <text x="60" y="294" class="sub">wire trainer handle</text>

  <rect x="320" y="220" width="230" height="100" class="box save"/>
  <text x="340" y="250" class="title">5. Load checkpoints</text>
  <text x="340" y="274" class="sub">restore state from JSON</text>
  <text x="340" y="294" class="sub">normalize LEASED jobs</text>

  <rect x="600" y="220" width="240" height="100" class="box"/>
  <text x="620" y="250" class="title">6. Fresh workers</text>
  <text x="620" y="274" class="sub">spawn new workers</text>
  <text x="620" y="294" class="sub">run until all jobs terminal</text>

  <!-- Row 1 arrows -->
  <path d="M 270 116 L 320 116" class="arrow"/>
  <path d="M 550 116 L 600 116" class="arrow"/>

  <!-- Row 1 -> Row 2 (step 3 down to step 4) -->
  <path d="M 720 156 L 720 188 L 155 188 L 155 220" class="arrow"/>

  <!-- Row 2 arrows -->
  <path d="M 270 270 L 320 270" class="arrow"/>
  <path d="M 550 270 L 600 270" class="arrow"/>
</svg>
