<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 12; ry: 12; }
      .title { font: 700 16px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #111827; }
      .text { font: 13px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #374151; }
      .arrow { stroke: #111827; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
      .subtle { fill: #f9fafb; stroke: #e5e7eb; stroke-width: 2; rx: 12; ry: 12; }
      .file { fill: #eef2ff; stroke: #6366f1; }
      .kill { fill: #fef2f2; stroke: #ef4444; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#111827"/>
    </marker>
  </defs>

  <rect x="24" y="24" width="912" height="372" class="subtle"/>
  <text x="44" y="52" class="title">Checkpoint + recovery demo (main.py)</text>

  <!-- Steps -->
  <rect x="64" y="96" width="260" height="84" class="box"/>
  <text x="84" y="128" class="title">1) Run warmup</text>
  <text x="84" y="152" class="text">tick reconciler + workers run</text>

  <rect x="360" y="96" width="240" height="84" class="box file"/>
  <text x="380" y="128" class="title">2) Save checkpoints</text>
  <text x="380" y="152" class="text">Trainer + Reconciler ’ JSON</text>

  <rect x="636" y="96" width="260" height="84" class="box kill"/>
  <text x="656" y="128" class="title">3) Kill actors</text>
  <text x="656" y="152" class="text">ray.kill(trainer/reconciler)</text>

  <rect x="64" y="236" width="260" height="110" class="box"/>
  <text x="84" y="270" class="title">4) Recreate actors</text>
  <text x="84" y="294" class="text">new Trainer + Reconciler</text>
  <text x="84" y="314" class="text">wire reconciler(trainer=...)</text>

  <rect x="360" y="236" width="240" height="110" class="box file"/>
  <text x="380" y="270" class="title">5) Load checkpoints</text>
  <text x="380" y="294" class="text">restore state from JSON</text>
  <text x="380" y="314" class="text">normalize LEASED jobs</text>

  <rect x="636" y="236" width="260" height="110" class="box"/>
  <text x="656" y="270" class="title">6) Start fresh workers</text>
  <text x="656" y="294" class="text">continue until terminal</text>

  <!-- Arrows -->
  <path d="M 324 138 C 336 138, 348 138, 360 138" class="arrow"/>
  <path d="M 600 138 C 612 138, 624 138, 636 138" class="arrow"/>
  <path d="M 766 180 C 766 210, 204 210, 194 236" class="arrow"/>
  <path d="M 324 292 C 336 292, 348 292, 360 292" class="arrow"/>
  <path d="M 600 292 C 612 292, 624 292, 636 292" class="arrow"/>
</svg>
