<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 10; ry: 10; }
      .title { font: 700 14px ui-sans-serif, system-ui, Arial; fill: #111827; }
      .label { font: 12px ui-sans-serif, system-ui, Arial; fill: #6b7280; }
      .note { font: 12px ui-sans-serif, system-ui, Arial; fill: #374151; }
      .arrow { stroke: #374151; stroke-width: 2; fill: none; marker-end: url(#ah); }
      .bg { fill: #f9fafb; stroke: #e5e7eb; stroke-width: 1.5; rx: 14; ry: 14; }
      .ok { fill: #ecfdf5; stroke: #10b981; }
      .warn { fill: #fff7ed; stroke: #f97316; }
      .term { fill: #fef2f2; stroke: #ef4444; }
    </style>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#374151"/>
    </marker>
  </defs>

  <rect x="16" y="16" width="848" height="448" class="bg"/>
  <text x="36" y="44" class="title">Job state machine (Reconciler)</text>
  <text x="36" y="64" class="note">Accept if execution checks pass AND (trainer_policy - job_policy) &lt;= max_policy_lag</text>

  <!-- Row 1: PENDING -> LEASED -> COMPLETED -->
  <rect x="40"  y="100" width="160" height="56" class="box"/>
  <text x="80"  y="134" class="title">PENDING</text>

  <rect x="280" y="100" width="160" height="56" class="box"/>
  <text x="320" y="134" class="title">LEASED</text>

  <rect x="560" y="100" width="180" height="56" class="box ok"/>
  <text x="600" y="134" class="title">COMPLETED</text>

  <!-- Row 2: RETRY_PENDING, FAILED_PERMANENT -->
  <rect x="40"  y="260" width="200" height="56" class="box warn"/>
  <text x="80"  y="294" class="title">RETRY_PENDING</text>

  <rect x="340" y="260" width="220" height="56" class="box term"/>
  <text x="375" y="294" class="title">FAILED_PERMANENT</text>

  <!-- STALE_POLICY -->
  <rect x="660" y="260" width="180" height="56" class="box term"/>
  <text x="695" y="294" class="title">STALE_POLICY</text>

  <!-- PENDING -> LEASED -->
  <path d="M 200 128 L 280 128" class="arrow"/>
  <text x="212" y="120" class="label">lease_job()</text>

  <!-- LEASED -> COMPLETED -->
  <path d="M 440 128 L 560 128" class="arrow"/>
  <text x="456" y="120" class="label">submit_result()</text>

  <!-- LEASED -> RETRY_PENDING (lease expired, lag ok) -->
  <path d="M 330 156 L 160 260" class="arrow"/>
  <text x="190" y="210" class="label">lease expired</text>
  <text x="190" y="224" class="label">(lag ok)</text>

  <!-- LEASED -> STALE_POLICY (stale result on submit) -->
  <path d="M 420 156 C 500 200, 650 220, 720 260" class="arrow"/>
  <text x="510" y="200" class="label">stale policy</text>
  <text x="510" y="214" class="label">(submit or expiry)</text>

  <!-- RETRY_PENDING -> LEASED (re-lease) -->
  <path d="M 140 260 C 140 200, 280 180, 310 156" class="arrow"/>
  <text x="155" y="198" class="label">re-lease</text>

  <!-- RETRY_PENDING -> FAILED_PERMANENT -->
  <path d="M 240 288 L 340 288" class="arrow"/>
  <text x="248" y="338" class="label">max_retries</text>
  <text x="248" y="352" class="label">exceeded</text>

  <!-- Legend -->
  <rect x="40" y="400" width="16" height="16" class="ok"/>
  <text x="64" y="414" class="note">terminal (success)</text>
  <rect x="220" y="400" width="16" height="16" class="term"/>
  <text x="244" y="414" class="note">terminal (failure)</text>
  <rect x="420" y="400" width="16" height="16" class="warn"/>
  <text x="444" y="414" class="note">retriable</text>
</svg>
